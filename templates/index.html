<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Engineer Tool</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef3ff;
            color: #1f2937;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }

        .topbar {
            background: #ffffff;
            border-radius: 18px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            font-size: 16px;
            font-weight: bold;
        }

        .subtext {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }

        .top-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .auth-link {
            color: #2563eb;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .small-muted {
            font-size: 14px;
            color: #6b7280;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.35fr 0.85fr;
            gap: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 22px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        h1, h2, h3 {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        select,
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="file"],
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            background: #fff;
        }

        textarea {
            min-height: 140px; /* chhota kiya */
            resize: vertical;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .primary { background: #2563eb; color: white; }
        .secondary { background: #3b82f6; color: white; }
        .dark { background: #111827; color: white; }
        .danger { background: #dc2626; color: white; }
        .light { background: #e5e7eb; color: #111827; }

        .result-box {
            min-height: 180px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            padding: 16px;
            background: #f9fafb;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .section-gap {
            margin-bottom: 20px;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #6b7280;
            white-space: pre-wrap;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 24px 0;
        }

        .history-search {
            margin-bottom: 14px;
        }

        .history-item {
            border: 1px solid #d1d5db;
            border-radius: 16px;
            padding: 16px;
            background: #f9fafb;
            margin-bottom: 14px;
        }

        .history-date {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .history-label {
            font-weight: bold;
            margin-top: 8px;
            margin-bottom: 6px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 9999;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            background: #eef3ff;
            border-radius: 24px;
            padding: 20px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            right: 16px;
            top: 12px;
            background: transparent;
            color: #111827;
            font-size: 28px;
            line-height: 1;
            padding: 4px 10px;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 960px) {
            .main-grid,
            .auth-grid,
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <div class="brand">Prompt Engineer Tool</div>
                <div class="subtext">Idea → perfect prompt generator, multi-language support</div>
            </div>

            <div class="top-actions">
                <a class="auth-link" onclick="openAuthModal()">Login/Signup</a>
                <div id="authStatus" class="small-muted">Checking login...</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- LEFT -->
            <div class="card">
                <h1>Prompt Builder</h1>

                <div class="form-grid">
                    <div>
                        <label for="mode">Mode</label>
                        <select id="mode">
                            <option>Generate Perfect Prompt</option>
                            <option>Improve Existing Prompt</option>
                        </select>
                    </div>

                    <div>
                        <label for="modelName">Model</label>
                        <select id="modelName">
                            <option>Flux</option>
                            <option>Midjourney</option>
                            <option>Stable Diffusion</option>
                            <option>DALL·E</option>
                            <option>Leonardo</option>
                        </select>
                    </div>

                    <div>
                        <label for="styleName">Visual Style</label>
                        <select id="styleName">
                            <option>Realistic</option>
                            <option>Ultra-Realistic</option>
                            <option>Animated</option>
                            <option>3D Animated</option>
                            <option>Cinematic</option>
                            <option>Anime</option>
                            <option>Fantasy</option>
                            <option>Dark</option>
                            <option>Minimal</option>
                        </select>
                    </div>

                    <div>
                        <label for="outputLanguage">Output Language</label>
                        <select id="outputLanguage">
                            <option>Auto</option>
                            <option>English</option>
                            <option>Hindi</option>
			    <option>Hinglish</option>
                            <option>Urdu</option>
                            <option>Arabic</option>
                            <option>French</option>
                            <option>Spanish</option>
                            <option>German</option>
                            <option>Japanese</option>
                            <option>Korean</option>
                            <option>Chinese</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 18px;">
                    <label for="idea">Enter your idea</label>
                    <textarea id="idea" placeholder="Example: ultra-realistic luxury car in rainy night with cinematic lighting"></textarea>
                </div>

                <div class="toolbar">
                    <button type="button" id="generateBtn" class="primary">Generate</button>
                    <button type="button" id="saveBtn" class="secondary">Save Prompt</button>
                    <button type="button" id="copyBtn" class="secondary">Copy Prompt</button>
                    <button type="button" id="downloadBtn" class="secondary">Download TXT</button>
                    <button type="button" id="clearBtn" class="danger">Clear</button>
                </div>
            </div>

            <!-- RIGHT -->
            <div>
                <div class="card section-gap">
                    <h2>Generated Result</h2>
                    <div id="result" class="result-box"></div>
                </div>

                <div class="card section-gap">
                    <h2>Negative Prompt</h2>
                    <div id="negativePrompt" class="result-box"></div>
                </div>

                <div class="card">
                    <h2>Image Upload → Prompt</h2>
                    <input type="file" id="imageFile" accept=".png,.jpg,.jpeg,.webp" />

                    <div class="toolbar">
                        <button type="button" class="primary" onclick="generateFromImage()">Generate From Image</button>
                        <button type="button" class="danger" onclick="deleteUploadedImage()">Delete Uploaded Image</button>
                    </div>

                    <div id="imageStatus" class="status"></div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="card">
            <h2>Saved Prompt History</h2>
            <div class="history-search">
                <input type="text" id="historySearch" placeholder="Search in saved prompts..." oninput="filterHistory()" />
            </div>
            <div id="historyContainer" class="small-muted">Login to see saved prompts.</div>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal-overlay">
        <div class="modal-box">
            <button type="button" class="modal-close" onclick="closeAuthModal()">×</button>

            <div class="auth-grid">
                <div class="card">
                    <h2>Login</h2>

                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter email" />

                    <div style="height: 12px;"></div>

                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" />

                    <div class="toolbar">
                        <button type="button" class="dark" onclick="login()">Login</button>
                        <button type="button" class="light" onclick="logout()">Logout</button>
                    </div>

                    <div id="loginStatus" class="status"></div>
                </div>

                <div class="card">
                    <h2>Signup</h2>

                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" placeholder="Enter username" />

                    <div style="height: 12px;"></div>

                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter email" />

                    <div style="height: 12px;"></div>

                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Create password" />

                    <div class="toolbar">
                        <button type="button" class="dark" onclick="signup()">Signup</button>
                    </div>

                    <div id="signupStatus" class="status"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let savedPrompts = [];

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.innerText = value || "";
        }

        function getValue(id) {
            const el = document.getElementById(id);
            return el ? el.value : "";
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function openAuthModal() {
            document.getElementById("authModal").classList.add("show");
        }

        function closeAuthModal() {
            document.getElementById("authModal").classList.remove("show");
        }

        async function fetchJSON(url, options = {}) {
            const response = await fetch(url, options);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data.error || data.result || ("Request failed: " + response.status));
            }
            return data;
        }

        function getIdeaPayload() {
            return {
                idea: getValue("idea"),
                mode: getValue("mode"),
                model_name: getValue("modelName"),
                style_name: getValue("styleName"),
                output_language: getValue("outputLanguage")
            };
        }

        function generatePrompt() {
    alert("Button working!");
        }
        async function generateFromImage() {
            try {
                const fileInput = document.getElementById("imageFile");

                if (!fileInput || !fileInput.files || !fileInput.files[0]) {
                    setText("imageStatus", "Please choose an image first.");
                    return;
                }

                setText("imageStatus", "Working...");

                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                formData.append("model_name", getValue("modelName"));
                formData.append("style_name", getValue("styleName"));
                formData.append("output_language", getValue("outputLanguage"));

                const response = await fetch("/api/image-to-prompt", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.error || "Something went wrong");
                }

                setText("result", data.result || "");
                setText("negativePrompt", data.negative_prompt || "");
                setText("imageStatus", "Done");
            } catch (e) {
                setText("imageStatus", e.message);
            }
        }

        async function deleteUploadedImage() {
            try {
                const data = await fetchJSON("/api/delete-uploaded-image", {
                    method: "POST"
                });

                const fileInput = document.getElementById("imageFile");
                if (fileInput) fileInput.value = "";

                setText("imageStatus", data.message || "Uploaded image deleted.");
            } catch (e) {
                setText("imageStatus", e.message);
            }
        }

        async function savePrompt() {
            try {
                const payload = {
                    ...getIdeaPayload(),
                    result: document.getElementById("result") ? document.getElementById("result").innerText : "",
                    negative_prompt: document.getElementById("negativePrompt") ? document.getElementById("negativePrompt").innerText : ""
                };

                const data = await fetchJSON("/api/save-prompt", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                alert(data.message || "Prompt saved successfully.");
                await loadSavedPrompts();
            } catch (e) {
                alert(e.message);
            }
        }

        async function loadSavedPrompts() {
            try {
                const data = await fetchJSON("/api/prompts");
                savedPrompts = data.prompts || [];
                renderHistory(savedPrompts);
            } catch (e) {
                document.getElementById("historyContainer").innerHTML = <div class="small-muted">${escapeHtml(e.message)}</div>;
            }
        }

        function renderHistory(prompts) {
            const container = document.getElementById("historyContainer");
            if (!container) return;

            if (!prompts.length) {
                container.innerHTML = <div class="small-muted">No saved prompts yet.</div>;
                return;
            }

            container.innerHTML = prompts.map(item => `
                <div class="history-item">
                    <div class="history-date">${escapeHtml(item.created_at || "")}</div>
                    <div><strong>Idea:</strong> ${escapeHtml(item.idea || "")}</div>
                    <div><strong>Mode:</strong> ${escapeHtml(item.mode || "")}</div>
                    <div><strong>Model:</strong> ${escapeHtml(item.model_name || "")}</div>
                    <div><strong>Style:</strong> ${escapeHtml(item.style_name || "")}</div>
                    <div><strong>Language:</strong> ${escapeHtml(item.output_language || "")}</div>
                    <div class="history-label">Prompt:</div>
                    <div class="result-box" style="min-height:auto;">${escapeHtml(item.result || "")}</div>
                    <div class="history-label">Negative Prompt:</div>
                    <div class="result-box" style="min-height:auto;">${escapeHtml(item.negative_prompt || "")}</div>
                </div>
            `).join("");
        }

        function filterHistory() {
            const q = getValue("historySearch").toLowerCase().trim();

            const filtered = savedPrompts.filter(item => {
                return (
                    (item.idea || "").toLowerCase().includes(q) ||
                    (item.result || "").toLowerCase().includes(q) ||
                    (item.negative_prompt || "").toLowerCase().includes(q)
                );
            });

            renderHistory(filtered);
        }

        function copyPrompt() {
            const result = document.getElementById("result") ? document.getElementById("result").innerText : "";
            const negative = document.getElementById("negativePrompt") ? document.getElementById("negativePrompt").innerText : "";
            const fullText = Generated Prompt:\n${result}\n\nNegative Prompt:\n${negative};

            navigator.clipboard.writeText(fullText)
                .then(() => alert("Copied to clipboard"))
                .catch(() => alert("Copy failed"));
        }

        async function downloadTxt() {
            try {
                const response = await fetch("/api/download-txt", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        result: document.getElementById("result") ? document.getElementById("result").innerText : "",
                        negative_prompt: document.getElementById("negativePrompt") ? document.getElementById("negativePrompt").innerText : ""
                    })
                });

                if (!response.ok) throw new Error("Download failed");

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;
                a.download = "prompt_result.txt";
                document.body.appendChild(a);
                a.click();
                a.remove();

                window.URL.revokeObjectURL(url);
            } catch (e) {
                alert(e.message);
            }
        }

        function clearPrompt() {
            const idea = document.getElementById("idea");
            if (idea) idea.value = "";
            setText("result", "");
            setText("negativePrompt", "");
            setText("imageStatus", "");
        }

        async function signup() {
            try {
                const data = await fetchJSON("/api/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: getValue("signupUsername"),
                        email: getValue("signupEmail"),
                        password: getValue("signupPassword")
                    })
                });

                setText("signupStatus", data.message || "Signup successful");
                await checkMe();
                closeAuthModal();
            } catch (e) {
                setText("signupStatus", e.message);
            }
        }

        async function login() {
            try {
                const data = await fetchJSON("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: getValue("loginEmail"),
                        password: getValue("loginPassword")
                    })
                });

                setText("loginStatus", data.message || "Login successful");
                await checkMe();
                closeAuthModal();
            } catch (e) {
                setText("loginStatus", e.message);
            }
        }

        async function logout() {
            try {
                const data = await fetchJSON("/api/logout", {
                    method: "POST"
                });

                setText("loginStatus", data.message || "Logged out");
                setText("authStatus", "Not logged in");
                document.getElementById("historyContainer").innerHTML = '<div class="small-muted">Login to see saved prompts.</div>';
            } catch (e) {
                setText("loginStatus", e.message);
            }
        }

        async function checkMe() {
            try {
                const data = await fetchJSON("/api/me");

                if (data.logged_in) {
                    setText("authStatus", Logged in as ${data.user.username});
                    await loadSavedPrompts();
                } else {
                    setText("authStatus", "Not logged in");
                    document.getElementById("historyContainer").innerHTML = '<div class="small-muted">Login to see saved prompts.</div>';
                }
            } catch (e) {
                setText("authStatus", "Not logged in");
            }
        }

        <div class="toolbar">
               <button type="button" id="generateBtn" class="primary">Generate</button>
               <button type="button" id="saveBtn" class="secondary">Save Prompt</button>
               <button type="button" id="copyBtn" class="secondary">Copy Prompt</button>
               <button type="button" id="downloadBtn" class="secondary">Download TXT</button>
               <button type="button" id="clearBtn" class="danger">Clear</button>
        </div>

   <script>
              document.addEventListener("DOMContentLoaded", function () {

              document.getElementById("generateBtn")?.addEventListener("click", generatePrompt);
              document.getElementById("saveBtn")?.addEventListener("click", savePrompt);
              document.getElementById("copyBtn")?.addEventListener("click", copyPrompt);
              document.getElementById("downloadBtn")?.addEventListener("click", downloadTxt);
              document.getElementById("clearBtn")?.addEventListener("click", clearPrompt);

              document.getElementById("loginBtn")?.addEventListener("click", login);
              document.getElementById("logoutBtn")?.addEventListener("click", logout);
             document.getElementById("signupBtn")?.addEventListener("click", signup);

     checkMe();
 });
   </script>
 </body>
</html>
