<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Engineer Tool</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef3ff;
            color: #1f2937;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        .topbar {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            font-size: 18px;
            font-weight: bold;
        }

        .muted {
            color: #6b7280;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        select, input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            background: #fff;
            outline: none;
        }

        textarea {
            min-height: 220px;
            resize: vertical;
        }

        .toolbar {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .primary {
            background: #2563eb;
            color: white;
        }

        .secondary {
            background: #3b82f6;
            color: white;
        }

        .danger {
            background: #dc2626;
            color: white;
        }

        .dark {
            background: #111827;
            color: white;
        }

        .gray {
            background: #e5e7eb;
            color: #111827;
        }

        .result-box {
            min-height: 190px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            padding: 16px;
            background: #f9fafb;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .result-section {
            margin-bottom: 20px;
        }

        .small-text {
            font-size: 13px;
            color: #6b7280;
            margin-top: 10px;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .history-item {
            border: 1px solid #d1d5db;
            border-radius: 16px;
            padding: 16px;
            background: #f9fafb;
            margin-bottom: 14px;
        }

        .history-head {
            font-size: 14px;
            color: #4b5563;
            margin-bottom: 10px;
        }

        .history-title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .search-row {
            margin-bottom: 14px;
        }

        .hidden {
            display: none !important;
        }

        .status {
            font-size: 14px;
            margin-top: 8px;
            color: #6b7280;
        }

        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 20px 0;
        }

        @media (max-width: 960px) {
            .grid,
            .auth-grid,
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <div class="brand">Prompt Engineer Tool</div>
                <div class="muted">Idea → perfect prompt generator, multi-language support</div>
            </div>

            <div id="authStatus" class="muted">Checking login...</div>
        </div>

        <div class="grid">
            <!-- LEFT -->
            <div class="card">
                <h1>Prompt Builder</h1>

                <div class="form-grid">
                    <div>
                        <label for="mode">Mode</label>
                        <select id="mode" name="mode">
                            <option>Generate Perfect Prompt</option>
                            <option>Improve Existing Prompt</option>
                        </select>
                    </div>

                    <div>
                        <label for="modelName">Model</label>
                        <select id="modelName" name="model">
                            <option>Flux</option>
                            <option>Midjourney</option>
                            <option>Stable Diffusion</option>
                            <option>DALL·E</option>
                            <option>Leonardo</option>
                        </select>
                    </div>

                    <div>
                        <label for="styleName">Visual Style</label>
                        <select id="styleName" name="style">
                            <option>Realistic</option>
                            <option>Ultra-Realistic</option>
                            <option>Animated</option>
                            <option>3D Animated</option>
                            <option>Cinematic</option>
                            <option>Anime</option>
                            <option>Fantasy</option>
                            <option>Dark</option>
                            <option>Minimal</option>
                        </select>
                    </div>

                    <div>
                        <label for="outputLanguage">Output Language</label>
                        <select id="outputLanguage" name="language">
                            <option>Auto</option>
                            <option>English</option>
                            <option>Hindi</option>
                            <option>Urdu</option>
                            <option>Arabic</option>
                            <option>French</option>
                            <option>Spanish</option>
                            <option>German</option>
                            <option>Japanese</option>
                            <option>Korean</option>
                            <option>Chinese</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 18px;">
                    <label for="idea">Enter your idea</label>
                    <textarea id="idea" placeholder="Example: ultra-realistic luxury car in rainy night with cinematic lighting"></textarea>
                </div>

                <div class="toolbar">
                    <button class="primary" type="button" onclick="generatePrompt()">Generate</button>
                    <button class="secondary" type="button" onclick="savePrompt()">Save Prompt</button>
                    <button class="secondary" type="button" onclick="copyPrompt()">Copy Prompt</button>
                    <button class="secondary" type="button" onclick="downloadTxt()">Download TXT</button>
                    <button class="danger" type="button" onclick="clearPrompt()">Clear</button>
                </div>
            </div>

            <!-- RIGHT -->
            <div>
                <div class="card result-section">
                    <h2>Generated Result</h2>
                    <div id="result" class="result-box"></div>
                </div>

                <div class="card result-section">
                    <h2>Negative Prompt</h2>
                    <div id="negativePrompt" class="result-box"></div>
                </div>

                <div class="card">
                    <h2>Image Upload → Prompt</h2>

                    <input type="file" id="imageFile" accept=".png,.jpg,.jpeg,.webp" />
                    <div class="toolbar">
                        <button class="primary" type="button" onclick="generateFromImage()">Generate From Image</button>
                        <button class="danger" type="button" onclick="deleteUploadedImage()">Delete Uploaded Image</button>
                    </div>
                    <div id="imageStatus" class="status"></div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="auth-grid">
            <div class="card">
                <h2>Login</h2>
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="Enter email" />

                <div style="height: 12px;"></div>

                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" />

                <div class="toolbar">
                    <button class="dark" type="button" onclick="login()">Login</button>
                    <button class="gray" type="button" onclick="logout()">Logout</button>
                </div>

                <div id="loginStatus" class="status"></div>
            </div>

            <div class="card">
                <h2>Signup</h2>
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" placeholder="Enter username" />

                <div style="height: 12px;"></div>

                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="Enter email" />

                <div style="height: 12px;"></div>

                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create password" />

                <div class="toolbar">
                    <button class="dark" type="button" onclick="signup()">Signup</button>
                </div>

                <div id="signupStatus" class="status"></div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="card">
            <h2>Saved Prompt History</h2>

            <div class="search-row">
                <input type="text" id="historySearch" placeholder="Search in saved prompts..." oninput="filterHistory()" />
            </div>

            <div id="historyContainer"></div>
        </div>
    </div>

    <script>
        let savedPrompts = [];

        function setText(id, value) {
            document.getElementById(id).innerText = value || "";
        }

        function getIdeaPayload() {
            return {
                idea: document.getElementById("idea").value,
                mode: document.getElementById("mode").value,
                model_name: document.getElementById("modelName").value,
                style_name: document.getElementById("styleName").value,
                output_language: document.getElementById("outputLanguage").value
            };
        }

        async function fetchJSON(url, options = {}) {
            const response = await fetch(url, options);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                const errorMsg =
                    data.error ||
                    data.result ||
                    Request failed with status ${response.status};
                throw new Error(errorMsg);
            }

            return data;
        }

        async function checkMe() {
            try {
                const data = await fetchJSON("/api/me");
                if (data.logged_in) {
                    setText("authStatus", Logged in as ${data.user.username} (${data.user.email}));
                    await loadSavedPrompts();
                } else {
                    setText("authStatus", "Not logged in");
                    document.getElementById("historyContainer").innerHTML = "<div class='muted'>Login to see saved prompts.</div>";
                }
            } catch (e) {
                setText("authStatus", "Unable to check login status");
            }
        }

        async function generatePrompt() {
            try {
                setText("result", "Working...");
                setText("negativePrompt", "Working...");

                const data = await fetchJSON("/api/process", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(getIdeaPayload())
                });

                document.getElementById("result").innerText = data.result || "";
                document.getElementById("negativePrompt").innerText = data.negative_prompt || "";
            } catch (e) {
                setText("result", e.message);
                setText("negativePrompt", e.message);
            }
        }

        async function generateFromImage() {
            try {
                const fileInput = document.getElementById("imageFile");
                if (!fileInput.files[0]) {
                    setText("imageStatus", "Please choose an image first.");
                    return;
                }

                setText("imageStatus", "Working...");

                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                formData.append("model_name", document.getElementById("modelName").value);
                formData.append("style_name", document.getElementById("styleName").value);
                formData.append("output_language", document.getElementById("outputLanguage").value);

                const response = await fetch("/api/image-to-prompt", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.error || "Something went wrong");
                }

                setText("result", data.result || "");
                setText("negativePrompt", data.negative_prompt || "");
                setText("imageStatus", "Done");
            } catch (e) {
                setText("imageStatus", e.message);
            }
        }

        async function deleteUploadedImage() {
            try {
                const data = await fetchJSON("/api/delete-uploaded-image", {
                    method: "POST"
                });

                document.getElementById("imageFile").value = "";
                setText("imageStatus", data.message || "Uploaded image deleted.");
            } catch (e) {
                setText("imageStatus", e.message);
            }
        }

        async function savePrompt() {
            try {
                const payload = {
                    ...getIdeaPayload(),
                    result: document.getElementById("result").innerText,
                    negative_prompt: document.getElementById("negativePrompt").innerText
                };

                const data = await fetchJSON("/api/save-prompt", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                alert(data.message || "Prompt saved.");
                await loadSavedPrompts();
            } catch (e) {
                alert(e.message);
            }
        }

        async function loadSavedPrompts() {
            try {
                const data = await fetchJSON("/api/prompts");
                savedPrompts = data.prompts || [];
                renderHistory(savedPrompts);
            } catch (e) {
                document.getElementById("historyContainer").innerHTML = <div class="muted">${e.message}</div>;
            }
        }

        function renderHistory(prompts) {
            const container = document.getElementById("historyContainer");

            if (!prompts.length) {
                container.innerHTML = <div class="muted">No saved prompts yet.</div>;
                return;
            }

            container.innerHTML = prompts.map(item => `
                <div class="history-item">
                    <div class="history-head">${item.created_at}</div>
                    <div class="history-title">${item.idea || "Untitled idea"}</div>
                    <div><strong>Mode:</strong> ${item.mode || ""}</div>
                    <div><strong>Model:</strong> ${item.model_name || ""}</div>
                    <div><strong>Style:</strong> ${item.style_name || ""}</div>
                    <div><strong>Language:</strong> ${item.output_language || ""}</div>
                    <div style="margin-top:10px;"><strong>Prompt:</strong></div>
                    <div class="result-box" style="min-height:auto;">${escapeHtml(item.result || "")}</div>
                    <div style="margin-top:10px;"><strong>Negative Prompt:</strong></div>
                    <div class="result-box" style="min-height:auto;">${escapeHtml(item.negative_prompt || "")}</div>
                </div>
            `).join("");
        }

        function filterHistory() {
            const q = document.getElementById("historySearch").value.toLowerCase().trim();

            const filtered = savedPrompts.filter(item => {
                return (
                    (item.idea || "").toLowerCase().includes(q) ||
                    (item.result || "").toLowerCase().includes(q) ||
                    (item.negative_prompt || "").toLowerCase().includes(q)
                );
            });

            renderHistory(filtered);
        }

        function copyPrompt() {
            const result = document.getElementById("result").innerText || "";
            const negativePrompt = document.getElementById("negativePrompt").innerText || "";
            const fullText = Generated Prompt:\n${result}\n\nNegative Prompt:\n${negativePrompt};

            navigator.clipboard.writeText(fullText)
                .then(() => alert("Copied to clipboard"))
                .catch(() => alert("Copy failed"));
        }

        async function downloadTxt() {
            try {
                const response = await fetch("/api/download-txt", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        result: document.getElementById("result").innerText || "",
                        negative_prompt: document.getElementById("negativePrompt").innerText || ""
                    })
                });

                if (!response.ok) {
                    throw new Error("Download failed");
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "prompt_result.txt";
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (e) {
                alert(e.message);
            }
        }

        function clearPrompt() {
            document.getElementById("idea").value = "";
            setText("result", "");
            setText("negativePrompt", "");
            setText("imageStatus", "");
        }

        async function signup() {
            try {
                const data = await fetchJSON("/api/signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: document.getElementById("signupUsername").value,
                        email: document.getElementById("signupEmail").value,
                        password: document.getElementById("signupPassword").value
                    })
                });

                setText("signupStatus", data.message || "Signup successful");
                await checkMe();
            } catch (e) {
                setText("signupStatus", e.message);
            }
        }

        async function login() {
            try {
                const data = await fetchJSON("/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: document.getElementById("loginEmail").value,
                        password: document.getElementById("loginPassword").value
                    })
                });

                setText("loginStatus", data.message || "Login successful");
                await checkMe();
            } catch (e) {
                setText("loginStatus", e.message);
            }
        }

        async function logout() {
            try {
                const data = await fetchJSON("/api/logout", {
                    method: "POST"
                });

                setText("loginStatus", data.message || "Logged out");
                setText("authStatus", "Not logged in");
                document.getElementById("historyContainer").innerHTML = "<div class='muted'>Login to see saved prompts.</div>";
            } catch (e) {
                setText("loginStatus", e.message);
            }
        }

        function escapeHtml(text) {
            return text
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        checkMe();
    </script>
</body>
</html>
